services:

  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.9.5'
    container_name: 'zookeeper'
    restart: 'unless-stopped'
    ports:
      - '2181:2181'
    environment:
      - 'ZOOKEEPER_CLIENT_PORT=2181'
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]

  kafka:
    image: 'confluentinc/cp-kafka:7.9.5'
    container_name: 'kafka'
    restart: 'unless-stopped'
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      - 'KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181'
      - 'KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      - 'KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      - 'KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]

  kafdrop:
    image: 'obsidiandynamics/kafdrop:4.2.0'
    container_name: 'kafdrop'
    restart: 'unless-stopped'
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '9000:9000'
    environment:
      - 'KAFKA_BROKERCONNECT=kafka:9092'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]

  rabbitmq:
    image: 'rabbitmq:4.2.1-management'
    container_name: 'rabbitmq'
    restart: 'unless-stopped'
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - 'RABBITMQ_DEFAULT_USER=guest'
      - 'RABBITMQ_DEFAULT_PASS=guest'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]

  postgres:
    image: 'postgres:18.0'
    container_name: 'postgres'
    restart: 'unless-stopped'
    ports:
      - '5432:5432'
    environment:
      - 'POSTGRES_DB=newsdb'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]

  news-app-1:
    image: 'news-app:1.0.0'
    container_name: 'news-app-1'
    restart: 'unless-stopped'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'KAFKA_HOST=kafka'
      - 'KAFKA_PORT=9092'
      - 'POSTGRES_HOST=postgres'

  news-app-2:
    image: 'news-app:1.0.0'
    container_name: 'news-app-2'
    restart: 'unless-stopped'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'KAFKA_HOST=kafka'
      - 'KAFKA_PORT=9092'
      - 'POSTGRES_HOST=postgres'

  news-app-3:
    image: 'news-app:1.0.0'
    container_name: 'news-app-3'
    restart: 'unless-stopped'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'KAFKA_HOST=kafka'
      - 'KAFKA_PORT=9092'
      - 'POSTGRES_HOST=postgres'

  nginx:
    image: 'nginx:1.29.8'
    container_name: 'nginx'
    restart: 'unless-stopped'
    volumes:
      - '$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
    ports:
      - '80:80'
    depends_on:
      - 'news-app-1'
      - 'news-app-2'
      - 'news-app-3'
